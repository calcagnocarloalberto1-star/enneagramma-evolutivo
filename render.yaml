services:
  - type: web
    name: enneagramma-evolutivo
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: "npm install && npm run build"
    startCommand: "node dist/index.cjs"
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
